          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Intangible Drilling Costs (IDCs) include labor, fuel, chemicals, and other non-salvageable costs of drilling a well. Under IRC §263(c), investors can deduct up to 100% of IDCs in the year incurred, potentially reducing taxable income by 65-80% of the total investment amount in Year 1. EnergyCalc Pro's Net Investment Calculator models these deductions based on your specific tax bracket and deal structure."
          }
        },

          "@type": "Question",

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Common red flags include guaranteed returns, pressure to invest immediately, unregistered operators, excessive fees hidden in PPM documents, and operators with SEC or state regulatory actions. EnergyCalc Pro's AI PPM Analyzer scans offering documents for red flags, and the AI Operator Screener checks any operator's background for known issues, regulatory actions, and verification steps."
          }
        },
        {
          "@type": "Question",
          "name": "What is a working interest in oil and gas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A working interest (WI) is an ownership stake in an oil and gas lease that obligates the owner to pay a proportionate share of drilling, completion, and operating costs. In return, the working interest owner receives a proportionate share of production revenue minus royalties and operating expenses. EnergyCalc Pro's Barrels to Cash and Nat Gas to Cash calculators model working interest income based on production rates, commodity prices, and operating costs."
          }
        },
        {
          "@type": "Question",
          "name": "What is percentage depletion and how does it benefit oil and gas investors?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Percentage depletion allows independent oil and gas producers and investors to deduct 15% of gross income from producing properties, up to 100% of the net income from the property. Unlike cost depletion, percentage depletion can exceed the investor's cost basis, providing a tax benefit unavailable in virtually any other asset class. This deduction continues for the life of the well."
          }
        }
      ]
