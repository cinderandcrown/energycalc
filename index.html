    <!-- Structured Data: FAQPage for search queries -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I calculate commodity investment returns?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Commodity Investor+ provides 8 specialized calculators: Net Investment Calculator (after-tax cost with IDC deductions and depletion), Barrels to Cash (oil production income), Natural Gas to Cash (MCF/day to net income), Rate of Return (IRR and payout analysis), Tax Impact (5-year model), Gold Purity (karat and spot valuation), Agricultural Yield (120+ crops), and Metal Cost-Basis (100+ metals). Enter your deal parameters and get instant financial projections."
          }
        },
        {
          "@type": "Question",
          "name": "What are intangible drilling costs (IDC) and how do they reduce my tax liability?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Intangible Drilling Costs (IDCs) include labor, fuel, chemicals, and other non-salvageable costs of drilling a well. Under IRC §263(c), investors can deduct up to 100% of IDCs in the year incurred, potentially reducing taxable income by 65-80% of the total investment amount in Year 1. Commodity Investor+'s Net Investment Calculator models these deductions based on your specific tax bracket and deal structure."
          }
        },
        {
          "@type": "Question",
          "name": "How do I spot commodity investment fraud?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Common red flags include guaranteed returns, pressure to invest immediately, unregistered operators, excessive fees hidden in PPM documents, and operators with SEC or state regulatory actions. Commodity Investor+'s AI PPM Analyzer scans offering documents for red flags, and the AI Operator Screener checks any operator's background for known issues, regulatory actions, and verification steps."
          }
        },
        {
          "@type": "Question",
          "name": "How do I calculate the cost basis for industrial metals like copper, aluminum, or steel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Commodity Investor+'s Metal Cost-Basis Calculator covers 100+ metals across 11 categories including base metals, steel & iron, precious metals, superalloys, aerospace materials, critical minerals, rare earth elements, battery metals, and scrap. Enter the weight, spot price, freight, processing, waste percentage, and storage costs to get a complete landed cost analysis with break-even pricing and P&L projections."
          }
        },
        {
          "@type": "Question",
          "name": "How do I project agricultural crop revenue per acre?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Commodity Investor+'s Agricultural Yield Calculator supports 120+ crops across 12 categories — grains, oilseeds, fiber, sugar, fruits, vegetables, tree nuts, tropical crops, forage, specialty, and biofuel. Set your acreage, expected yield, market price, and insurance costs to generate multi-year profit projections with bull/bear scenario analysis."
          }
        },
        {
          "@type": "Question",
          "name": "What is a working interest in oil and gas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A working interest (WI) is an ownership stake in an oil and gas lease that obligates the owner to pay a proportionate share of drilling, completion, and operating costs. In return, the working interest owner receives a proportionate share of production revenue minus royalties and operating expenses. Commodity Investor+'s Barrels to Cash and Nat Gas to Cash calculators model working interest income based on production rates, commodity prices, and operating costs."
          }
        },
        {
          "@type": "Question",
          "name": "What rare earth and battery metals can I analyze?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Commodity Investor+ covers 12 rare earth elements including Neodymium, Praseodymium, Dysprosium, Terbium, Cerium, Lanthanum, Yttrium, and more. The platform also covers critical minerals and battery metals like Lithium, Cobalt, Nickel Sulfate, Manganese Sulfate, Graphite, and Silicon Metal — essential for defense, electronics, EV supply chains, and clean energy."
          }
        }
